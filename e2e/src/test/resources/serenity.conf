serenity {
  project.name = "Arduino Blocks IDE - E2E Tests"
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = true
}

webdriver {
  driver = chrome
  autodownload = true
  base.url = "http://localhost:3000"

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1920,1080",
        "--remote-allow-origins=*"
      ]
    }
  }
}

environments {
  ci {
    webdriver {
      capabilities {
        "goog:chromeOptions" {
          args = [
            "--headless=new",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--disable-gpu",
            "--window-size=1920,1080",
            "--remote-allow-origins=*"
          ]
        }
      }
    }
  }
}
