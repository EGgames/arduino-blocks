name: CI — Unit + Integration + E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Unit & Integration Tests (Jest) ────────────────────────────────────────
  unit-integration:
    name: Unit & Integration Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run Jest tests with coverage
        run: npm test -- --coverage --watchAll=false --ci
        env:
          CI: true

      - name: Upload Jest coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7

  # ── E2E Tests (Serenity BDD + Cucumber + WebDriver) ────────────────────────
  e2e:
    name: E2E Tests (Serenity BDD + Cucumber)
    runs-on: ubuntu-latest
    needs: unit-integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Install Node.js dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Start React development server
        run: |
          npm start &
          echo "React server PID: $!"
        env:
          BROWSER: none
          CI: false

      - name: Wait for React app to be ready
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://localhost:3000
          max-attempts: 30
          retry-delay: 3s

      - name: Run Serenity E2E tests (headless Chrome)
        working-directory: e2e
        run: |
          mvn verify -B \
            -Dwebdriver.driver=chrome \
            "-Dchrome.switches=--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080,--remote-allow-origins=*" \
            -Dapp.base.url=http://localhost:3000 \
            -Dserenity.take.screenshots=FOR_FAILURES
        env:
          JAVA_OPTS: "-Xmx1g"

      - name: Upload Serenity HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-e2e-report
          path: e2e/target/site/serenity/
          retention-days: 14

      - name: Upload Serenity screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: serenity-screenshots
          path: e2e/target/site/serenity/screenshots/
          retention-days: 7
